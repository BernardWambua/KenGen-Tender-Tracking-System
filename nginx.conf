server {
    listen 8080;
    server_name 172.16.103.129;  # Replace with your domain or IP

    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/tendertracking_access.log;
    error_log /var/log/nginx/tendertracking_error.log;

    # Static files
    location /static/ {
        alias /home/bernard/projects/KenGen-Tender-Tracking-System/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /home/bernard/projects/KenGen-Tender-Tracking-System/media/;
        expires 30d;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

