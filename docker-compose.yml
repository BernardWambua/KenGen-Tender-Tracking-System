services:
  db:
    image: postgres:16
    container_name: tendertracking-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-yourtendersdb}
      POSTGRES_USER: ${DB_USER:-yourusername}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tendertracking-web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_NAME: ${DB_NAME:-yourtendersdb}
      DB_USER: ${DB_USER:-yourusername}
      DB_PASSWORD: ${DB_PASSWORD:-yourpassword}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

volumes:
  postgres_data:
  static_volume:
  media_volume: